server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Service worker e manifesto do PWA — nunca cachear, senão o navegador
    # não pega as atualizações do app (já tivemos esse problema antes).
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # Imagens/fontes — nome com hash, pode cachear por muito tempo
    location ~* \.(?:css|woff2?|png|jpg|jpeg|gif|svg|avif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # JS — cache mais curto, por segurança (evita ficar preso em versão antiga)
    location ~* \.js$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Rotas do React Router — sempre cai no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
